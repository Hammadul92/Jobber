name: Deploy to Droplet

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE_TAG=${{ github.sha }}
          script: |
            set -e
            cd ~/Contractorz/Jobber

            echo "Using IMAGE_TAG=${IMAGE_TAG}"

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Start backend only
            docker compose -f docker-compose.prod.yml up -d --pull always --force-recreate --no-deps app

            # Run Django migrations
            echo "Running Django migrations..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py migrate --noinput

            # Collect static files for admin / rest_framework
            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py collectstatic --noinput

            # Start frontend after static files exist
            docker compose -f docker-compose.prod.yml up -d frontend

            # Recreate any other services if needed
            docker compose -f docker-compose.prod.yml up -d --no-deps --pull always --force-recreate

            echo "✅ Deployment completed"
