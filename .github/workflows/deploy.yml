name: Deploy to Droplet

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE_TAG=${{ github.sha }}
          script: |
            set -e
            cd ~/Contractorz/Jobber

            echo "Using IMAGE_TAG=${IMAGE_TAG}"

            # 0️⃣ Pull latest repo changes (docker-compose.prod.yml, configs, etc.)
            git pull origin main

            # 1️⃣ Pull latest backend/frontend images
            docker compose -f docker-compose.prod.yml pull

            # 2️⃣ Recreate backend (app)
            docker compose -f docker-compose.prod.yml up -d --pull always --force-recreate --remove-orphans app

            # 3️⃣ Run Django migrations
            echo "Running Django migrations..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py migrate --noinput

            # 4️⃣ Collect static files into shared volume
            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py collectstatic --noinput

            # 5️⃣ Recreate frontend so it sees populated static volume
            echo "Restarting frontend to pick up static files..."
            docker compose -f docker-compose.prod.yml up -d --pull always --force-recreate --remove-orphans frontend

            echo "✅ Deployment completed"
