{% load static %}
<section id="faqs" class="relative w-full scroll-mt-24 bg-secondary px-6 py-12 md:px-16 md:py-28 lg:min-h-screen lg:px-32">
  <div class="absolute bottom-7 left-0 w-40 md:bottom-10 md:w-44 lg:bottom-16 lg:w-auto"><img src="{% static 'public_site/images/rounded-horizontal-rectangle-white.svg' %}" alt="Design Element" class="text-white"></div>
  <div class="absolute right-0 top-20 w-14 md:w-20 lg:w-fit"><img src="{% static 'public_site/images/rounded-vertical-rectangle.svg' %}" alt="Design Element" class="w-full"></div>
  <div class="mb-10 md:mb-4 lg:mb-0"><h2 class="text-center font-heading text-xl font-bold leading-relaxed text-white md:text-2xl lg:text-3xl lg:leading-12">Frequently Asked <br><span class="text-accent">Questions</span></h2><p class="font-intro mt-3 text-center text-lg text-white/90">Got questions? We've got answers.</p></div>
  <div class="z-20 w-full px-6 md:px-16 lg:px-32" data-accordion><div class="mx-auto max-w-4xl">
    {% for faq in faqs %}<article class="border-b border-[rgba(255,255,255,0.08)] py-6"><button class="flex w-full cursor-pointer items-center justify-between text-left" type="button" aria-expanded="{% if forloop.first %}true{% else %}false{% endif %}"><h3 class="font-intro text-xl {% if forloop.first %}text-accent{% else %}text-white{% endif %}">{{ faq.question }}</h3><span class="text-white/80"><svg class="h-5 w-5 transform transition-transform duration-200 {% if forloop.first %}rotate-180{% else %}rotate-0{% endif %}" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span></button><div class="mt-4 overflow-hidden transition-[max-height,opacity] duration-300 ease-in-out" style="max-height:{% if forloop.first %}500px{% else %}0px{% endif %};opacity:{% if forloop.first %}1{% else %}0{% endif %}"><p class="text-base leading-relaxed text-white/80 md:text-lg">{{ faq.answer }}</p></div></article>{% empty %}<p class="py-6 text-center text-white/80">No FAQs available yet.</p>{% endfor %}
  </div></div>
</section>
